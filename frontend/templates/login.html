<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#f6f7fb; margin:0; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:#fff; padding:32px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.08); width: 380px; }
    h1 { margin:0 0 16px; font-size:22px; }
    .field { margin-bottom:14px; }
    label { display:block; font-size:13px; color:#333; margin-bottom:6px; }
    input { width:100%; padding:10px 12px; border:1px solid #dcdfe6; border-radius:8px; font-size:14px; outline:none; }
    input:focus { border-color:#409eff; box-shadow:0 0 0 3px rgba(64,158,255,.15); }
    .btn { width:100%; padding:10px 12px; background:#409eff; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:15px; }
    .btn:hover { background:#318ae6; }
    .muted { font-size:13px; color:#666; margin-top:10px; text-align:center; }
    .error { background:#fde7e9; color:#a0111f; padding:10px 12px; border-radius:8px; margin-bottom:12px; }
    .success { background:#e6f6ec; color:#0f5132; padding:10px 12px; border-radius:8px; margin-bottom:12px; }
    .token { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; word-break: break-all; background:#f4f6f8; padding:8px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Log in</h1>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
      <div class="success">{{ success }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required value="{{ email or '' }}" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button class="btn" type="submit">Log in</button>
    </form>

    {% if token %}
      <p class="muted">Use this token for API calls (Bearer):</p>
      <div class="token">{{ token }}</div>
      <p class="muted">Try: <a href="/docs" target="_blank">/docs</a> or <code>GET /auth/me</code> with the token.</p>
    {% endif %}

    <div class="muted">No account? <a href="/signup">Create one</a></div>
  </div>
</body>
</html>
